name: CI Pipeline

# Déclenchement sur push ou pull request
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      # Récupérer le code du repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Installer les dépendances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Vérification syntaxique du code Python
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120

      # Lancer les tests unitaires
      - name: Run tests
        run: pytest tests/ -v